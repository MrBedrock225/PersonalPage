<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camila VHS Experience</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #7CFFB2;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }
    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, rgba(0,255,120,0.08), #000 70%);
    }
    .panel {
      width: min(800px, 90vw);
      min-height: 500px;
      background: rgba(0,20,0,0.8);
      border: 1px solid rgba(124,255,178,0.35);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(124,255,178,0.15);
      position: relative;
    }
    .hidden { display: none; }
    button, input {
      background: #001a08;
      color: #7CFFB2;
      border: 1px solid #7CFFB2;
      padding: 12px;
      font-family: inherit;
      margin-top: 10px;
      width: 100%;
    }
    button:hover { cursor: pointer; filter: brightness(1.2); }
    .type {
      white-space: pre-wrap;
      line-height: 1.8;
      min-height: 260px;
      font-size: 20px;
    }
    .tvboot {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      overflow: hidden;
      pointer-events: none;
    }
    .tvboot::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background: #fff;
      box-shadow: 0 0 30px #fff;
      transform: translateY(-50%) scaleX(0);
      animation: crtLine 1.2s ease forwards;
    }
    .tvboot::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      animation: crtFlash 1.8s ease forwards;
    }
    @keyframes crtLine {
      0% { transform: translateY(-50%) scaleX(0); }
      40% { transform: translateY(-50%) scaleX(1); }
      100% { transform: translateY(-50%) scaleX(1); opacity: 0; }
    }
    @keyframes crtFlash {
      0% { opacity: 0; }
      35% { opacity: 0.95; }
      65% { opacity: 0.25; }
      100% { opacity: 0; visibility: hidden; }
    }
      40% { transform: scaleY(0.01) scaleX(1); opacity: 1; }
      70% { transform: scaleY(1) scaleX(1); opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <div class="tvboot"></div>
  <div class="screen">
    <div class="panel">
      <div id="menu">
        <h1>SYSTEM MENU</h1>
        <button id="camilaBtn">Camila</button>
      </div>

      <div id="login" class="hidden">
        <h2>LOGIN REQUIRED</h2>
        <input id="username" placeholder="nombre" />
        <input id="password" placeholder="clave" maxlength="5" />
        <button id="loginBtn">Ingresar</button>
        <p id="status"></p>
      </div>

      <div id="letter" class="hidden">
        <div id="text" class="type"></div>
      </div>
    </div>
  </div>

  <audio autoplay>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f5c9f8c8.mp3?filename=tv-static-109624.mp3" type="audio/mpeg">
  </audio>

  <script>
    const VALID_USER = 'Camila';
    const VALID_PASSWORDS = ['73194','48216','90527','16483','52891'];

    const menu = document.getElementById('menu');
    const login = document.getElementById('login');
    const letter = document.getElementById('letter');
    const status = document.getElementById('status');
    const text = document.getElementById('text');

    document.getElementById('camilaBtn').onclick = () => {
      menu.classList.add('hidden');
      login.classList.remove('hidden');
    };

    function tryLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();

      if (user !== VALID_USER || !VALID_PASSWORDS.includes(pass)) {
        status.textContent = 'Credenciales inválidas';
        return;
      }

      login.classList.add('hidden');
      letter.classList.remove('hidden');
      playLetter();
    }

    document.getElementById('loginBtn').onclick = tryLogin;

    const pages = [
      'Hola Camila...

Feliz cumpleaños. Esto no es una carta normal.',
      'Es una cinta perdida entre recuerdos, ruido y tiempo.',
      'Cada memoria contigo merece rebobinarse una vez más.',
      'Con cariño,
Neo <3'
    ];

    let page = 0;
    function typePage(content, cb) {
      text.innerHTML = '';
      let i = 0;
      function step() {
        if (i < content.length) {
          text.innerHTML += content[i] === '
' ? '<br>' : content[i];
          i++;
          setTimeout(step, 30 + Math.random() * 20);
        } else if (cb) {
          setTimeout(cb, 2200);
        }
      }
      step();
    }

    function playLetter() {
      typePage(pages[page], () => {
        page = (page + 1) % pages.length;
        playLetter();
      });
    }
  </script>
</body>
</html>
