<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta VHS de Cumpleaños</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #7CFFB2;
      font-family: "Courier New", monospace;
      height: 100vh;
    }

    canvas { position: fixed; inset: 0; pointer-events: none; }

    .tv-intro {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 20;
      animation: tvBoot 2.4s ease forwards;
      transform-origin: center;
    }

    @keyframes tvBoot {
      0% { opacity: 1; transform: scaleY(0.005) scaleX(0); filter: brightness(4); }
      35% { transform: scaleY(0.01) scaleX(1); }
      70% { transform: scaleY(1) scaleX(1); }
      100% { opacity: 0; visibility: hidden; }
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(30,255,120,0.06), transparent 60%),
        linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.1));
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.04) 0 1px, transparent 2px 4px);
      opacity: 0.35;
      animation: scan 8s linear infinite;
    }

    .terminal {
      width: min(920px, 88vw);
      height: 540px;
      padding: 28px;
      border: 1px solid rgba(124,255,178,0.3);
      background: rgba(0, 15, 5, 0.72);
      box-shadow: 0 0 20px rgba(124,255,178,0.12), inset 0 0 40px rgba(124,255,178,0.04);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .header { margin-bottom: 18px; opacity: 0.8; }

    .viewport {
      position: relative;
      height: 430px;
      overflow: hidden;
    }

    .message {
      position: absolute;
      inset: 0;
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: clamp(16px, 2vw, 22px);
      text-shadow: 0 0 8px rgba(124,255,178,0.35);
      opacity: 0;
      transform: translateY(40px);
      transition: transform 0.8s ease, opacity 0.8s ease;
    }

    .message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .message.hide {
      opacity: 0;
      transform: translateY(-40px);
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: #7CFFB2;
      animation: blink 1s steps(1) infinite;
      box-shadow: 0 0 8px #7CFFB2;
    }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes scan { from { transform: translateY(-10px); } to { transform: translateY(10px); } }
  </style>
</head>
<body>
  <div class="tv-intro"></div>
  <canvas id="noise"></canvas>
  <canvas id="fx"></canvas>

  <div class="screen">
    <div class="terminal">
      <div class="header">[ birthday_memories_vhs.exe ] reproduciendo...</div>
      <div class="viewport">
        <div id="msg" class="message"></div>
      </div>
    </div>
  </div>

  <audio id="staticAudio" autoplay>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f5c9f8c8.mp3?filename=tv-static-109624.mp3" type="audio/mpeg">
  </audio>

  <script>
    const pages = [
`Hola... feliz cumpleaños.\n\nNo quería darte una carta normal.` ,
`Quería que se sintiera como encontrar una cinta perdida.\nUna memoria vieja que aún sigue viva.` ,
`Gracias por existir en esta línea temporal tan rota y aun así hacerla más bonita.` ,
`Cada recuerdo contigo merece rebobinarse una y otra vez.\n\nCon cariño,\nNeo <3`
    ];

    const msg = document.getElementById('msg');
    let pageIndex = 0;

    function typeText(text, cb) {
      msg.innerHTML = '';
      msg.className = 'message show';
      let i = 0;
      function step() {
        if (i < text.length) {
          msg.innerHTML += text[i] === '\n' ? '<br>' : text[i];
          i++;
          setTimeout(step, 25 + Math.random() * 35);
        } else if (cb) {
          setTimeout(cb, 2200);
        }
      }
      step();
    }

    function nextPage() {
      typeText(pages[pageIndex], () => {
        msg.classList.remove('show');
        msg.classList.add('hide');
        setTimeout(() => {
          pageIndex = (pageIndex + 1) % pages.length;
          msg.classList.remove('hide');
          typeText(pages[pageIndex], nextPage);
        }, 900);
      });
    }

    setTimeout(nextPage, 2200);

    const noise = document.getElementById('noise');
    const fx = document.getElementById('fx');
    const nctx = noise.getContext('2d');
    const fctx = fx.getContext('2d');

    function resize() {
      noise.width = fx.width = innerWidth;
      noise.height = fx.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    function renderNoise() {
      const img = nctx.createImageData(noise.width, noise.height);
      const buffer = new Uint32Array(img.data.buffer);
      for (let i = 0; i < buffer.length; i++) {
        const shade = Math.random() * 40;
        buffer[i] = (18 << 24) | (shade << 16) | (shade << 8) | shade;
      }
      nctx.putImageData(img, 0, 0);
      requestAnimationFrame(renderNoise);
    }
    renderNoise();

    const particles = Array.from({ length: 100 }, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.8,
      s: Math.random() * 0.8 + 0.2,
    }));

    function animateFX() {
      fctx.clearRect(0, 0, fx.width, fx.height);
      for (const p of particles) {
        p.y -= p.s;
        if (p.y < -5) { p.y = innerHeight + 5; p.x = Math.random() * innerWidth; }
        fctx.beginPath();
        fctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fctx.fillStyle = 'rgba(124,255,178,0.25)';
        fctx.fill();
      }
      requestAnimationFrame(animateFX);
    }
    animateFX();
  </script>
</body>
</html>
