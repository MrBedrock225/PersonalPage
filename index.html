<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Camila VHS</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="tv-frame">

  <!-- LOGIN -->
  <section id="login" class="view active">
    <div class="login-box">
      <h2>Acceso</h2>
      <input id="user" placeholder="Nombre">
      <input id="pass" placeholder="Clave" maxlength="5">
      <button id="loginBtn">Entrar</button>
      <p id="status"></p>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chat" class="view hidden">
    <div class="chat-box">
      <div class="msg">Mensajes</div>
      <div class="msg highlight" id="openMessage">🎂 Camila</div>
    </div>
  </section>

  <!-- CARTA -->
  <section id="letter" class="view hidden">
    <div class="terminal">
      <div id="text"></div>

      <div class="controls">
        <button id="pause">Pausar</button>
        <button id="resume">Reanudar</button>
        <button id="rewind">Rebobinar</button>
        <button id="exit">Salir</button>
      </div>
    </div>
  </section>

</div>

<script src="scripts/app.js"></script>
</body>
</html>
