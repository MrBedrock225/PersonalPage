<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camila VHS</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="screen-glow"></div>
  <div class="scanlines"></div>

  <main class="screen">
    <!-- LOGIN -->
    <section id="login" class="panel active">
      <h1>ACCESS TERMINAL</h1>
      <input id="user" placeholder="Nombre" />
      <input id="pass" placeholder="Clave" maxlength="5" />
      <button id="loginBtn">Entrar</button>
      <p id="status"></p>
    </section>

    <!-- CHAT -->
    <section id="chat" class="panel hidden">
      <div class="chat-header">Mensajes</div>
      <div class="chat-item" id="openMessage">🎂 Camila</div>
    </section>

    <!-- CARTA -->
    <section id="letter" class="panel hidden">
      <div id="text" class="letter-box"></div>

      <div class="controls">
        <button id="pause">Pausar</button>
        <button id="resume">Reanudar</button>
        <button id="rewind">Rebobinar</button>
        <button id="exit">Salir</button>
      </div>
    </section>
  </main>

  <script src="scripts/app.js"></script>
</body>
</html>
