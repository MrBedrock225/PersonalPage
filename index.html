<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta VHS de Cumpleaños</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #020403;
      color: #7CFFB2;
      font-family: "Courier New", monospace;
      height: 100vh;
    }

    #noise, #fx {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(30,255,120,0.06), transparent 60%),
        linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.1));
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode: screen;
      opacity: 0.35;
      animation: scan 8s linear infinite;
    }

    .screen::after {
      content: "PLAY ▶  SP   00:00:19";
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 14px;
      opacity: 0.7;
      text-shadow: 0 0 6px #7CFFB2;
      animation: flicker 0.12s infinite alternate;
    }

    .terminal {
      position: relative;
      width: min(900px, 88vw);
      min-height: 520px;
      padding: 28px;
      border: 1px solid rgba(124,255,178,0.3);
      background: rgba(0, 15, 5, 0.72);
      box-shadow:
        0 0 20px rgba(124,255,178,0.12),
        inset 0 0 40px rgba(124,255,178,0.04);
      backdrop-filter: blur(1px);
      border-radius: 8px;
      transform: perspective(1200px) rotateX(2deg);
    }

    .header {
      margin-bottom: 18px;
      opacity: 0.8;
    }

    .line {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: clamp(16px, 2vw, 22px);
      text-shadow: 0 0 8px rgba(124,255,178,0.35);
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: #7CFFB2;
      vertical-align: middle;
      animation: blink 1s steps(1) infinite;
      box-shadow: 0 0 8px #7CFFB2;
    }

    .glitch {
      animation: glitch 3s infinite;
      display: inline-block;
    }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes scan {
      from { transform: translateY(-10px); }
      to { transform: translateY(10px); }
    }
    @keyframes flicker {
      from { opacity: 0.55; }
      to { opacity: 0.85; }
    }
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-1px, 1px); }
      40% { transform: translate(1px, -1px); }
      60% { transform: translate(-0.5px, 0); }
      80% { transform: translate(0.5px, 1px); }
    }
  </style>
</head>
<body>
  <canvas id="noise"></canvas>
  <canvas id="fx"></canvas>

  <div class="screen">
    <div class="terminal">
      <div class="header">[ birthday_message.exe ] iniciado...</div>
      <div id="text" class="line"></div><span class="cursor"></span>
    </div>
  </div>

  <script>
    const message = `Hola, feliz cumpleaños.\n\nNo quería darte una carta normal, porque eso sería demasiado... humano y predecible.\nAsí que te hice esto: una pantalla perdida entre cintas VHS, ruido, terminales viejas y un montón de líneas verdes como si el tiempo se hubiera quedado pensando en ti.\n\nGracias por existir en esta línea temporal tan mal optimizada.\nCada momento contigo se siente como una escena que vale la pena rebobinar.\n\nEspero que hoy te rías muchísimo, que te sientas querida y que este nuevo año te traiga cosas tan bonitas como tu forma de estar en la vida.\n\nCon cariño,\nNeo <3`;

    const textEl = document.getElementById('text');
    let i = 0;

    function type() {
      if (i < message.length) {
        const char = message[i] === '\n' ? '<br>' : message[i];
        textEl.innerHTML += char;
        i++;
        setTimeout(type, 35 + Math.random() * 45);
      }
    }
    type();

    // Procedural VHS noise
    const noise = document.getElementById('noise');
    const nctx = noise.getContext('2d');

    function resize() {
      noise.width = innerWidth;
      noise.height = innerHeight;
      fx.width = innerWidth;
      fx.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    function renderNoise() {
      const img = nctx.createImageData(noise.width, noise.height);
      const buffer = new Uint32Array(img.data.buffer);
      for (let i = 0; i < buffer.length; i++) {
        const shade = Math.random() * 40;
        buffer[i] = (20 << 24) | (shade << 16) | (shade << 8) | shade;
      }
      nctx.putImageData(img, 0, 0);
      requestAnimationFrame(renderNoise);
    }
    renderNoise();

    // Floating procedural particles / signal dust
    const fx = document.getElementById('fx');
    const fctx = fx.getContext('2d');
    const particles = Array.from({ length: 80 }, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.8,
      s: Math.random() * 0.6 + 0.2,
    }));

    function animateFX() {
      fctx.clearRect(0, 0, fx.width, fx.height);
      for (const p of particles) {
        p.y -= p.s;
        if (p.y < -5) {
          p.y = innerHeight + 5;
          p.x = Math.random() * innerWidth;
        }
        fctx.beginPath();
        fctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fctx.fillStyle = 'rgba(124,255,178,0.25)';
        fctx.fill();
      }
      requestAnimationFrame(animateFX);
    }
    animateFX();
  </script>
</body>
</html>
